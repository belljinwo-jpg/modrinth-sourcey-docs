skill: sourcey-validation
version: "0.1.0"
catalog:
  kind: skill
  audience: public
  visibility: public
  role: canonical
harness:
  cases:
    - name: invalid-non-https-input-fails
      runner: default
      inputs:
        public_url: http://localhost
        evidence_url: http://localhost/evidence.json
      expect:
        status: failure
        receipt:
          schema: runx.receipt.v1
          state: sealed
          disposition: closed
          reason_code: process_failed
runners:
  default:
    default: true
    type: cli-tool
    command: node
    args: [run.mjs]
    inputs:
      public_url: { type: string, required: true }
      evidence_url: { type: string, required: true }
